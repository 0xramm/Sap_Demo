<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Request Access</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
        #boot-placeholder {
            font-family: Arial, sans-serif;
            padding: 2rem;
            color: #555;
        }
    </style>
    <script>
        // Safety net: if something throws before UI5 even gets a chance to
        // render, show it on screen instead of leaving a silent blank page.
        window.addEventListener("error", function (e) {
            var el = document.getElementById("boot-placeholder");
            if (el) {
                el.innerHTML = "<h2 style='color:#b00'>Failed to load</h2><pre>" +
                    (e.error && e.error.stack || e.message) + "</pre>";
            }
        });
    </script>
    <script
        id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.150.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resource-roots='{
            "accessportal.requestportal": "./"
        }'
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-frame-options="trusted"
    ></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div
        data-sap-ui-component
        data-name="accessportal.requestportal"
        data-id="container"
        data-settings='{"id" : "accessportal.requestportal"}'
        data-handle-validation="true"
    >
        <div id="boot-placeholder">Loading Request Access…</div>
    </div>
</body>
</html>
